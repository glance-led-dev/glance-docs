<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 340" font-family="Montserrat, Segoe UI, sans-serif">
  <defs>
    <style>
      .anno{fill:#00FF00;font-size:13px;font-weight:600}
      .mut{fill:#8a929c;font-size:12px}
      .lead{stroke:#00FF00;stroke-width:1.5;fill:none}
      .dim{stroke:#7bd0ff;stroke-width:1.5;fill:none}
      .dimt{fill:#7bd0ff;font-size:12px;font-weight:600}
    </style>
    <marker id="d1" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto"><path d="M8,1 L2,4 L8,7" fill="none" stroke="#7bd0ff" stroke-width="1.5"/></marker>
    <marker id="d2" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto"><path d="M0,1 L6,4 L0,7" fill="none" stroke="#7bd0ff" stroke-width="1.5"/></marker>
    <marker id="dot" markerWidth="6" markerHeight="6" refX="3" refY="3"><circle cx="3" cy="3" r="3" fill="#00FF00"/></marker>
  </defs>

  <rect x="0" y="0" width="760" height="340" fill="#0b0f14"/>

  <!-- panel (64x32 shown at 8x): origin at 150,70 -->
  <rect x="150" y="70" width="512" height="256" fill="#000" stroke="#2a3038" stroke-width="2"/>
  <!-- faint pixel grid every 8 px along x every 32 -->
  <g stroke="#161b22" stroke-width="1">
    <line x1="214" y1="70" x2="214" y2="326"/><line x1="278" y1="70" x2="278" y2="326"/>
    <line x1="342" y1="70" x2="342" y2="326"/><line x1="406" y1="70" x2="406" y2="326"/>
    <line x1="470" y1="70" x2="470" y2="326"/><line x1="534" y1="70" x2="534" y2="326"/>
    <line x1="598" y1="70" x2="598" y2="326"/>
    <line x1="150" y1="134" x2="662" y2="134"/><line x1="150" y1="198" x2="662" y2="198"/><line x1="150" y1="262" x2="662" y2="262"/>
  </g>

  <!-- the image: 16x16 at panel (4,8) => svg (182,134) size 128 -->
  <rect x="182" y="134" width="128" height="128" fill="none" stroke="#00FF00" stroke-width="1.5" stroke-dasharray="5 4"/>
  <!-- a sun glyph inside -->
  <circle cx="246" cy="198" r="34" fill="#ffd23f"/>
  <g stroke="#ffd23f" stroke-width="6" stroke-linecap="round">
    <line x1="246" y1="146" x2="246" y2="130"/><line x1="246" y1="250" x2="246" y2="266"/>
    <line x1="194" y1="198" x2="178" y2="198"/><line x1="298" y1="198" x2="314" y2="198"/>
    <line x1="209" y1="161" x2="198" y2="150"/><line x1="283" y1="235" x2="294" y2="246"/>
    <line x1="283" y1="161" x2="294" y2="150"/><line x1="209" y1="235" x2="198" y2="246"/>
  </g>
  <!-- temperature text to the right -->
  <text x="360" y="212" fill="#ffffff" font-size="72" font-weight="700">72°</text>

  <!-- top-left corner callout -->
  <circle cx="182" cy="134" r="4" fill="#00FF00"/>
  <line class="lead" x1="182" y1="134" x2="120" y2="46" marker-end="url(#dot)"/>
  <text class="anno" x="18" y="34">(x, y) = TOP-LEFT corner</text>
  <text class="mut" x="18" y="52" font-size="11">here x=4, y=8 →  c.image("sun.png", 4, 8, w=16, h=16)</text>

  <!-- width bracket (top of image) -->
  <line class="dim" x1="182" y1="120" x2="310" y2="120" marker-start="url(#d1)" marker-end="url(#d2)"/>
  <text class="dimt" x="228" y="114" text-anchor="middle">w = 16</text>

  <!-- height bracket (left of image) -->
  <line class="dim" x1="168" y1="134" x2="168" y2="262" marker-start="url(#d1)" marker-end="url(#d2)"/>
  <text class="dimt" x="150" y="202" text-anchor="middle" transform="rotate(-90 150 202)">h = 16</text>

  <!-- panel height 32px -->
  <line class="dim" x1="686" y1="70" x2="686" y2="326" marker-start="url(#d1)" marker-end="url(#d2)"/>
  <text class="dimt" x="704" y="202" transform="rotate(-90 704 202)" text-anchor="middle">panel = 32 px tall</text>
</svg>
