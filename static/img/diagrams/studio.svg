<text x="34" y="148" fill="#c58aff" font-size="12" font-weight="400" text-anchor="start" font-family="JetBrains Mono, monospace" >def now(c, ctx):</text>
<text x="34" y="170" fill="#d7dde5" font-size="12" font-weight="400" text-anchor="start" font-family="JetBrains Mono, monospace" >    c.clear()</text>
<text x="34" y="192" fill="#d7dde5" font-size="12" font-weight="400" text-anchor="start" font-family="JetBrains Mono, monospace" >    zip = ctx.inputs.get(&quot;zip&quot;, &quot;90210&quot;)</text>
<text x="34" y="214" fill="#d7dde5" font-size="12" font-weight="400" text-anchor="start" font-family="JetBrains Mono, monospace" >    data = http.get(AQI_URL)[&quot;json&quot;]</text>
<text x="34" y="236" fill="#d7dde5" font-size="12" font-weight="400" text-anchor="start" font-family="JetBrains Mono, monospace" >    c.header(&quot;AIR QUALITY&quot;, bg=&quot;green&quot;)</text>
<text x="34" y="258" fill="#d7dde5" font-size="12" font-weight="400" text-anchor="start" font-family="JetBrains Mono, monospace" >    c.stat(str(data[&quot;aqi&quot;]), &quot;AQI&quot;, 2, 12)</text>
<text x="34" y="280" fill="#6c7393" font-size="12" font-weight="400" text-anchor="start" font-family="JetBrains Mono, monospace" >    print(&quot;aqi =&quot;, data[&quot;aqi&quot;])</text>
