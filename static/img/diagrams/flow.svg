<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 892 172" font-family="Montserrat, Segoe UI, sans-serif">
  <defs>
    <linearGradient id="fcard" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#171d24"/>
      <stop offset="1" stop-color="#10151b"/>
    </linearGradient>
    <marker id="farr" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#00FF00"/>
    </marker>
    <style>
      .t{fill:#f0f2f5;font-size:16px;font-weight:700;text-anchor:middle}
      .s{fill:#8b939d;font-size:11.5px;text-anchor:middle}
      .i{fill:#00FF00;font-size:20px;font-weight:700;text-anchor:middle}
      .a{stroke:#00FF00;stroke-width:2.5;fill:none;marker-end:url(#farr)}
    </style>
  </defs>

  <rect x="0" y="0" width="892" height="172" rx="16" fill="#0b0f14"/>

  <g>
    <rect x="24" y="28" width="186" height="116" rx="14" fill="url(#fcard)" stroke="#2a313b"/>
    <rect x="24" y="28" width="186" height="4" rx="2" fill="#00FF00"/>
    <circle cx="117" cy="64" r="22" fill="#0b0f14" stroke="#2a313b"/>
    <text class="i" x="117" y="72">1</text>
    <text class="t" x="117" y="110">Get the code</text>
    <text class="s" x="117" y="128">clone the repo</text>

    <rect x="240" y="28" width="186" height="116" rx="14" fill="url(#fcard)" stroke="#2a313b"/>
    <rect x="240" y="28" width="186" height="4" rx="2" fill="#00FF00"/>
    <circle cx="333" cy="64" r="22" fill="#0b0f14" stroke="#2a313b"/>
    <text class="i" x="333" y="72">2</text>
    <text class="t" x="333" y="110">Open Studio</text>
    <text class="s" x="333" y="128">your workspace</text>

    <rect x="456" y="28" width="186" height="116" rx="14" fill="url(#fcard)" stroke="#2a313b"/>
    <rect x="456" y="28" width="186" height="4" rx="2" fill="#00FF00"/>
    <circle cx="549" cy="64" r="22" fill="#0b0f14" stroke="#2a313b"/>
    <text class="i" x="549" y="72">3</text>
    <text class="t" x="549" y="110">Build it</text>
    <text class="s" x="549" y="128">with AI or by hand</text>

    <rect x="672" y="28" width="186" height="116" rx="14" fill="url(#fcard)" stroke="#2a313b"/>
    <rect x="672" y="28" width="186" height="4" rx="2" fill="#00FF00"/>
    <circle cx="765" cy="64" r="22" fill="#0b0f14" stroke="#2a313b"/>
    <text class="i" x="765" y="72">4</text>
    <text class="t" x="765" y="110">Publish</text>
    <text class="s" x="765" y="128">open a pull request</text>
  </g>

  <path class="a" d="M214 86 L236 86"/>
  <path class="a" d="M430 86 L452 86"/>
  <path class="a" d="M646 86 L668 86"/>
</svg>
