<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 190" font-family="Montserrat, Segoe UI, sans-serif">
  <rect width="760" height="190" rx="14" fill="#0b0f0e"/>
  <rect x="1" y="1" width="758" height="188" rx="13" fill="none" stroke="#1c2420"/>
  <text x="30" y="36" fill="#e6e9e7" font-size="16" font-weight="800">Refresh = how often your app re-renders with fresh data</text>

  <!-- timeline -->
  <line x1="60" y1="110" x2="700" y2="110" stroke="#243029" stroke-width="2"/>
  <g fill="#2bff6e">
    <circle cx="120" cy="110" r="6"/><circle cx="310" cy="110" r="6"/>
    <circle cx="500" cy="110" r="6"/><circle cx="690" cy="110" r="6"/>
  </g>
  <g fill="#a7b0ab" font-size="12" text-anchor="middle">
    <text x="120" y="140">render</text><text x="310" y="140">render</text>
    <text x="500" y="140">render</text><text x="690" y="140">render</text>
  </g>
  <g fill="#8b90a0" font-size="12" text-anchor="middle">
    <text x="215" y="94">refresh: 300s</text><text x="405" y="94">300s</text><text x="595" y="94">300s</text>
  </g>
  <g stroke="#2bff6e" stroke-width="2" fill="none" opacity="0.6">
    <path d="M150 100 Q215 78 280 100"/><path d="M340 100 Q405 78 470 100"/><path d="M530 100 Q595 78 660 100"/>
  </g>
  <text x="380" y="176" fill="#8b90a0" font-size="11.5" text-anchor="middle">Use 3600 (hourly) for slow data, 60-300 for fast-moving data like scores</text>
</svg>
