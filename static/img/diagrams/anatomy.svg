<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 380" font-family="Montserrat, Segoe UI, sans-serif">
  <rect width="920" height="380" rx="16" fill="#0b0f0e"/>
  <rect x="1" y="1" width="918" height="378" rx="15" fill="none" stroke="#1c2420"/>
  <!-- folder label -->
  <text x="40" y="52" fill="#e6e9e7" font-size="22" font-weight="800">apps/</text>
  <text x="97" y="52" fill="#2bff6e" font-size="22" font-weight="800">local-aqi/</text>
  <text x="40" y="76" fill="#8b90a0" font-size="13">One app = one folder. Two files do the work.</text>

  <!-- manifest card -->
  <g transform="translate(40 104)">
    <rect width="270" height="210" rx="12" fill="#111614" stroke="#243029"/>
    <rect width="270" height="40" rx="12" fill="#0f2418"/>
    <rect y="26" width="270" height="14" fill="#0f2418"/>
    <text x="16" y="26" fill="#2bff6e" font-size="15" font-weight="700">manifest.yaml</text>
    <text x="16" y="72" fill="#e6e9e7" font-size="12.5" font-family="JetBrains Mono, monospace">id: local-aqi</text>
    <text x="16" y="94" fill="#e6e9e7" font-size="12.5" font-family="JetBrains Mono, monospace">width: 128  height: 32</text>
    <text x="16" y="116" fill="#e6e9e7" font-size="12.5" font-family="JetBrains Mono, monospace">pages: [now, health]</text>
    <text x="16" y="138" fill="#e6e9e7" font-size="12.5" font-family="JetBrains Mono, monospace">inputs:</text>
    <text x="30" y="158" fill="#a7b0ab" font-size="12.5" font-family="JetBrains Mono, monospace">- key: zip  (free-text)</text>
    <text x="30" y="176" fill="#a7b0ab" font-size="12.5" font-family="JetBrains Mono, monospace">- key: city</text>
    <text x="135" y="200" fill="#00ff00" font-size="12" font-weight="700" text-anchor="middle">the SETTINGS</text>
  </g>

  <!-- app.star card -->
  <g transform="translate(340 104)">
    <rect width="270" height="210" rx="12" fill="#111614" stroke="#243029"/>
    <rect width="270" height="40" rx="12" fill="#0f2418"/>
    <rect y="26" width="270" height="14" fill="#0f2418"/>
    <text x="16" y="26" fill="#2bff6e" font-size="15" font-weight="700">app.star</text>
    <text x="16" y="72" fill="#c58aff" font-size="12.5" font-family="JetBrains Mono, monospace">def now(c, ctx):</text>
    <text x="30" y="94" fill="#e6e9e7" font-size="12.5" font-family="JetBrains Mono, monospace">c.fill("black")</text>
    <text x="30" y="116" fill="#e6e9e7" font-size="12.5" font-family="JetBrains Mono, monospace">zip = ctx.inputs["zip"]</text>
    <text x="30" y="138" fill="#e6e9e7" font-size="12.5" font-family="JetBrains Mono, monospace">c.text(zip, 4, 12,</text>
    <text x="44" y="156" fill="#e6e9e7" font-size="12.5" font-family="JetBrains Mono, monospace">color="green")</text>
    <text x="135" y="200" fill="#00ff00" font-size="12" font-weight="700" text-anchor="middle">the PICTURE</text>
  </g>

  <!-- arrow -->
  <g transform="translate(628 200)">
    <path d="M0 8 H50" stroke="#2bff6e" stroke-width="3" fill="none"/>
    <path d="M46 2 L56 8 L46 14 Z" fill="#2bff6e"/>
  </g>

  <!-- resulting panel -->
  <g transform="translate(700 120)">
    <text x="90" y="0" fill="#8b90a0" font-size="13" text-anchor="middle">renders to</text>
    <rect x="0" y="16" width="180" height="120" rx="10" fill="#000" stroke="#243029"/>
    <!-- fake LED text -->
    <g fill="#00ff00">
      <rect x="20" y="60" width="6" height="6"/><rect x="28" y="60" width="6" height="6"/><rect x="36" y="60" width="6" height="6"/>
      <rect x="20" y="68" width="6" height="6"/><rect x="44" y="68" width="6" height="6"/>
      <rect x="20" y="76" width="6" height="6"/><rect x="28" y="76" width="6" height="6"/><rect x="36" y="76" width="6" height="6"/>
    </g>
    <g fill="#78dcff">
      <rect x="70" y="60" width="6" height="6"/><rect x="86" y="60" width="6" height="6"/>
      <rect x="70" y="68" width="6" height="6"/><rect x="78" y="68" width="6" height="6"/><rect x="86" y="68" width="6" height="6"/>
      <rect x="70" y="76" width="6" height="6"/><rect x="86" y="76" width="6" height="6"/>
    </g>
    <g fill="#f7990f">
      <rect x="118" y="60" width="6" height="6"/><rect x="126" y="60" width="6" height="6"/><rect x="134" y="60" width="6" height="6"/>
      <rect x="118" y="68" width="6" height="6"/>
      <rect x="118" y="76" width="6" height="6"/><rect x="126" y="76" width="6" height="6"/><rect x="134" y="76" width="6" height="6"/>
    </g>
    <text x="90" y="156" fill="#a7b0ab" font-size="12" text-anchor="middle">128 × 32 LED panel</text>
  </g>
</svg>
